{% extends 'base.html' %}
{% block title %}Add Train{% endblock %}
{% block content %}
<div class="page-header"><h2>➕ Add New Train</h2></div>
<div class="auth-card" style="max-width:600px">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Train Number</label>
                <input type="text" name="train_number" required placeholder="e.g. 12345">
            </div>
            <div class="form-group">
                <label>Train Name</label>
                <input type="text" name="train_name" required placeholder="e.g. Rajdhani Express">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Source</label>
                <input type="text" name="source" required placeholder="From city">
            </div>
            <div class="form-group">
                <label>Destination</label>
                <input type="text" name="destination" required placeholder="To city">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Departure Time</label>
                <input type="time" name="departure_time" required>
            </div>
            <div class="form-group">
                <label>Arrival Time</label>
                <input type="time" name="arrival_time" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Total Seats</label>
                <input type="number" name="total_seats" required min="1" placeholder="e.g. 200">
            </div>
            <div class="form-group">
                <label>Fare (₹)</label>
                <input type="number" name="fare" required min="1" step="0.01" placeholder="e.g. 500">
            </div>
        </div>
        <div class="form-group">
            <label>Run Days</label>
            <input type="text" name="run_days" value="Daily" placeholder="e.g. Daily / Mon,Wed,Fri">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Add Train</button>
    </form>
</div>
{% endblock %}
